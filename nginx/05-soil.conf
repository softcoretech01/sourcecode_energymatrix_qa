server {
    listen 80;
    server_name soil.softcoretech.in;

    # Allow Certbot to renew certificates in the future
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/soil;
    }

    # Force everyone else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name soil.softcoretech.in;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/soil.softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soil.softcoretech.in/privkey.pem;

    # Performance & Security Tweaks
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html/soil;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://soil_backend_container:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
