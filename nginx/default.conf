server {
    listen 80;
    server_name softcoretech.in www.softcoretech.in;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name softcoretech.in www.softcoretech.in;

    # SSL Certificates (Mounted from Host)
    ssl_certificate /etc/letsencrypt/live/softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/softcoretech.in/privkey.pem;

    # SSL Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. API PROXY (Fixed for 404)
    location ^~ /energymatrix/uat/api/ {
        # This strips '/energymatrix/uat/' but LEAVES '/api/'
        # Input: /energymatrix/uat/api/auth/login
        # Output to Backend: /api/auth/login
        rewrite ^/energymatrix/uat/(.*)$ /$1 break;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        client_max_body_size 100M;
    }

    # 2. REACT FRONTEND
    location /energymatrix/uat/ {
        alias /usr/share/nginx/html/energymatrix/uat/;
        index index.html;
        try_files $uri $uri/ /energymatrix/uat/index.html;
    }

    # 3. ROOT REDIRECT (Only for EnergyMatrix)
    location = / {
        if ($host = "softcoretech.in") {
            return 301 /energymatrix/uat/;
        }
        if ($host = "www.softcoretech.in") {
            return 301 /energymatrix/uat/;
        }
    }
}

