server {
    listen 443 ssl;
    server_name hrms.softcoretech.in;

    ssl_certificate /etc/letsencrypt/live/hrms.softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrms.softcoretech.in/privkey.pem;

    location / {
        # This MUST match the path inside the Nginx container volume
        root /usr/share/nginx/html/hrms;
        index Index.html;
        # If the file is named Index.html (capital I), make sure it matches here
        try_files $uri $uri/ =404;
    }

    location /api/ {
        # Using the direct container name is more stable than variables for simple proxying
        proxy_pass http://hrms_backend:8000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
