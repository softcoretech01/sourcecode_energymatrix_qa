server {
    listen 80;
    server_name rentinsight.softcoretech.in;
    
    # Allow renewal challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rentinsight.softcoretech.in;

    ssl_certificate /etc/letsencrypt/live/rentinsight.softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentinsight.softcoretech.in/privkey.pem;

    # RentInsight Frontend
    location /qa/ {
        alias /usr/share/nginx/html/rentinsight_qa/;
        index index.html;
        try_files $uri $uri/ /qa/index.html;
    }

    # Redirect root domain to /qa/
    location = / {
        return 301 /qa/;
    }
}
