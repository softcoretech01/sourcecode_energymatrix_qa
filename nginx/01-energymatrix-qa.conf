server {
    listen 80;
    server_name uat.softcoretech.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name uat.softcoretech.in;

    ssl_certificate /etc/letsencrypt/live/uat.softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.softcoretech.in/privkey.pem;

    # 1. BACKEND API
    location /energymatrix/uat/api/ {
        # This removes '/energymatrix/uat/api/' so the Python app sees only the route (e.g., /auth/login)
        rewrite ^/energymatrix/uat/(.*)$ /$1 break;

        proxy_pass http://uat_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
   # 2. FRONTEND REACT
    location /energymatrix/uat/ {
        # 'root' is more reliable than 'alias' for reloads
        root /usr/share/nginx/html;
        index index.html;
        # Try the file, then folder, then fallback to index.html
        try_files $uri $uri/ /energymatrix/uat/index.html;
    }

    # Remove the @uat_fallback block entirely as it's not needed with 'root'

    # New block to handle the React routing fallback correctly with alias
    location @uat_fallback {
        rewrite ^ /energymatrix/uat/index.html break;
    }

    # 3. Handle the URL without the trailing slash
    location = /energymatrix/uat {
        return 301 /energymatrix/uat/;
    }
}
